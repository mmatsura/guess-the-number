<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Numberrrr – Login</title>
    <link rel="stylesheet" href="../css/general.css" />
    <link rel="stylesheet" href="../css/desktop.css" />
    <link rel="stylesheet" href="../css/tablet.css" />
    <link rel="stylesheet" href="../css/mobile.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="screen" id="screen-login">
        <main class="form-wrapper">
            <a href="index.html" class="back-btn" aria-label="Go back">
                <img src="../img/arrow-left-solid.svg" alt="Back" width="20" height="20" />
            </a>

            <div class="form-card form-card--login">
                <h2 class="form-title">Login</h2>
                <p class="form-subtitle">Welcome back! Enter your details below.</p>

                <form novalidate>
                    <div class="input-group">
                        <!-- ✅ ДОДАНО id="loginEmail" -->
                        <input class="form-input" type="text" id="loginEmail" placeholder="Email Address"
                            autocomplete="email" />
                        <span class="input-icon">
                            <img src="../img/user-solid.svg" alt="User Icon" width="18" height="18" />
                        </span>
                    </div>

                    <div class="input-group">
                        <!-- ✅ ДОДАНО id="loginPassword" -->
                        <input class="form-input" type="password" id="loginPassword" placeholder="Password"
                            autocomplete="current-password" />
                        <span class="input-icon">
                            <img src="../img/unlock-alt-solid.svg" alt="Lock Icon" width="18" height="18" />
                        </span>
                    </div>

                    <button type="submit" class="btn btn-tan btn-full" id="loginBtn">Log In</button>
                </form>

                <p class="form-footer">
                    Don't have an account?
                    <a href="signup.html" class="link-btn">Sign up</a>
                </p>
            </div>
        </main>
    </div>

    <script src="../script/game.js"></script>
    <script>
        // Отримуємо елементи за ID
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('loginEmail');
        const passwordInput = document.getElementById('loginPassword');

        async function handleLogin() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showToast('Please fill in all fields', true);
                return;
            }

            const success = await login(email, password);

            if (success) {
                window.location.href = 'game.html';
            }
        }

        loginBtn.onclick = (e) => {
            e.preventDefault();
            handleLogin();
        };

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleLogin();
            }
        });
    </script>
</body>

</html>
